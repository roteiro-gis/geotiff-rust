name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests with all features
        run: cargo test --workspace --all-features

  no-default-features:
    name: No default features
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test TIFF reader with no default features
        run: cargo test -p tiff-reader --no-default-features

      - name: Test TIFF writer with no default features
        run: cargo test -p tiff-writer --no-default-features

      - name: Test GeoTIFF reader with no default features
        run: cargo test -p geotiff-reader --no-default-features

      - name: Test GeoTIFF reader with COG feature set (includes local)
        run: cargo test -p geotiff-reader --no-default-features --features cog

  corpus:
    name: Corpus sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify corpus fixtures are up to date
        run: ./scripts/fetch-interoperability-corpus.sh --verify-only

      - name: Verify fuzz seeds
        run: |
          ./scripts/seed-fuzz-corpus.sh
          git diff --exit-code -- fuzz/corpus

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        fuzz_target: [tiff_open, geotiff_open]
    env:
      FUZZ_TIME: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable for cargo-fuzz
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-bin-v2-0.13.1-stable

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            rustup run stable cargo install cargo-fuzz --version 0.13.1 --locked
          fi

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml --bins

      - name: Lint fuzz targets
        run: cargo clippy --manifest-path fuzz/Cargo.toml --bins -- -D warnings

      - name: Build fuzz target
        working-directory: fuzz
        run: cargo fuzz build ${{ matrix.fuzz_target }}

      - name: Run fuzz target
        working-directory: fuzz
        run: cargo fuzz run ${{ matrix.fuzz_target }} corpus/${{ matrix.fuzz_target }} -- -max_total_time=${{ env.FUZZ_TIME }}

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.fuzz_target }}-${{ github.sha }}
          path: fuzz/artifacts
          if-no-files-found: ignore
